<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>正在准备 Windows 更新</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    .lock-overlay {
      position: fixed;
      inset: 0;
      background: #0078d4;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-btn {
      position: absolute;
      top: 20px;
      right: 24px;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, color 0.2s, background 0.2s;
      box-shadow: none;
      opacity: 0;
    }
    .close-btn:hover { opacity: 1; color: rgba(255, 255, 255, 0.7); background: rgba(255, 255, 255, 0.08); }
    .update-content { text-align: center; color: #fff; }
    .spinner {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      animation: pulse 1.4s ease-in-out infinite both;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    .update-title {
      font-size: 28px;
      font-weight: 300;
      margin: 0 0 12px 0;
      letter-spacing: 0.5px;
    }
    .update-sub {
      font-size: 15px;
      opacity: 0.9;
      margin: 0 0 40px 0;
      font-weight: 300;
    }
    .progress-bar {
      width: 320px;
      height: 4px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 2px;
      overflow: hidden;
      margin: 0 auto;
    }
    .progress-inner {
      height: 100%;
      width: 30%;
      background: #fff;
      border-radius: 2px;
      animation: progress 2s ease-in-out infinite;
    }
    @keyframes progress {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(200%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <div class="lock-overlay">
    <button class="close-btn" title="退出" id="closeBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12" />
      </svg>
    </button>
    <div class="update-content">
      <div class="spinner">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <p class="update-title">正在准备 Windows 更新</p>
      <p class="update-sub">请不要关闭电脑</p>
      <div class="progress-bar">
        <div class="progress-inner"></div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('closeBtn').addEventListener('click', () => {
      if (window.electronAPI && typeof window.electronAPI.closeLockWindow === 'function') {
        window.electronAPI.closeLockWindow()
      } else {
        window.close()
      }
    })
  </script>
</body>
</html>
