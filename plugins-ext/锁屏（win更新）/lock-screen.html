<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windows正在进行更新 0%</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    .lock-overlay {
      position: fixed;
      inset: 0;
      background: #0078d4;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-btn {
      position: absolute;
      top: 20px;
      right: 24px;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, color 0.2s, background 0.2s;
      box-shadow: none;
      opacity: 0;
    }
    .close-btn:hover { opacity: 1; color: rgba(255, 255, 255, 0.7); background: rgba(255, 255, 255, 0.08); }
    .update-content { text-align: center; color: #fff; }
    .spinner-wrap { margin: 0 auto 32px; width: 40px; height: 40px; color: #fff; }
    .spinner-wrap svg { width: 100%; height: 100%; }
    .spinner-wrap .dot { animation: dot-scale 0.75s ease-in-out infinite both; }
    .spinner-wrap .dot:nth-child(1) { animation-delay: 0s; transform-origin: 4px 4px; }
    .spinner-wrap .dot:nth-child(2) { animation-delay: 0.125s; transform-origin: 12px 4px; }
    .spinner-wrap .dot:nth-child(3) { animation-delay: 0.25s; transform-origin: 20px 4px; }
    .spinner-wrap .dot:nth-child(4) { animation-delay: 0.375s; transform-origin: 4px 12px; }
    .spinner-wrap .dot:nth-child(5) { animation-delay: 0.5s; transform-origin: 12px 12px; }
    .spinner-wrap .dot:nth-child(6) { animation-delay: 0.625s; transform-origin: 20px 12px; }
    @keyframes dot-scale {
      0%, 100% { transform: scale(0.3); opacity: 0.5; }
      50% { transform: scale(1); opacity: 1; }
    }
    .update-title {
      font-size: 28px;
      font-weight: 300;
      margin: 0 0 12px 0;
      letter-spacing: 0.5px;
    }
    .update-sub {
      font-size: 15px;
      opacity: 0.9;
      margin: 0 0 40px 0;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="lock-overlay">
    <button class="close-btn" title="退出" id="closeBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12" />
      </svg>
    </button>
    <div class="update-content">
      <div class="spinner-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <circle class="dot" cx="4" cy="4" r="3"/>
          <circle class="dot" cx="12" cy="4" r="3"/>
          <circle class="dot" cx="20" cy="4" r="3"/>
          <circle class="dot" cx="4" cy="12" r="3"/>
          <circle class="dot" cx="12" cy="12" r="3"/>
          <circle class="dot" cx="20" cy="12" r="3"/>
        </svg>
      </div>
      <p class="update-title">Windows正在进行更新 0%</p>
      <p class="update-sub">请勿关闭计算机。你的计算机可能会重启几次。</p>
    </div>
  </div>
  <script>
    document.getElementById('closeBtn').addEventListener('click', () => {
      if (window.electronAPI && typeof window.electronAPI.closeLockWindow === 'function') {
        window.electronAPI.closeLockWindow()
      } else {
        window.close()
      }
    })
  </script>
</body>
</html>
